<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Formation Planner</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <h1>⚽ Formation Planner</h1>
            <div class="header-actions">
                <button id="btn-undo" class="btn btn-icon" title="Undo (Ctrl+Z)" disabled>↶</button>
                <button id="btn-redo" class="btn btn-icon" title="Redo (Ctrl+Y)" disabled>↷</button>
                <button id="btn-save" class="btn btn-secondary">💾 Save</button>
                <button id="btn-load" class="btn btn-secondary">📂 Load</button>
                <button id="btn-export" class="btn btn-primary">📷 Export PNG</button>
            </div>
        </header>

        <div class="main-layout">
            <!-- Sidebar -->
            <aside class="sidebar">
                <!-- Formation Controls -->
                <section class="panel">
                    <h3>Formation</h3>
                    <div class="form-group">
                        <label for="player-count">Players (incl. GK)</label>
                        <input type="number" id="player-count" min="1" max="11" value="11">
                    </div>
                    <div class="form-group">
                        <label for="formation-select">Preset</label>
                        <select id="formation-select"></select>
                    </div>
                    <div class="form-group">
                        <label for="formation-custom">Custom (e.g. 4-3-3)</label>
                        <div class="input-row">
                            <input type="text" id="formation-custom" placeholder="4-3-3">
                            <button id="btn-apply-custom" class="btn btn-small">Apply</button>
                        </div>
                    </div>
                    <button id="btn-reset-positions" class="btn btn-secondary btn-full">Reset Positions</button>
                </section>

                <!-- Team Customization -->
                <section class="panel">
                    <h3>Team Style</h3>
                    <div class="form-group">
                        <label for="team-name">Team Name</label>
                        <input type="text" id="team-name" placeholder="My Team" maxlength="30">
                    </div>
                    <div class="form-group color-row">
                        <div>
                            <label for="jersey-color">Jersey</label>
                            <input type="color" id="jersey-color" value="#e74c3c">
                        </div>
                        <div>
                            <label for="text-color">Number</label>
                            <input type="color" id="text-color" value="#ffffff">
                        </div>
                        <div>
                            <label for="gk-color">GK</label>
                            <input type="color" id="gk-color" value="#f39c12">
                        </div>
                    </div>
                </section>

                <!-- Drawing Tools -->
                <section class="panel">
                    <h3>Tactical Drawing</h3>
                    <div class="tool-buttons">
                        <button class="btn btn-tool active" data-tool="select" title="Select/Move">👆</button>
                        <button class="btn btn-tool" data-tool="arrow" title="Draw Arrow">➡️</button>
                        <button class="btn btn-tool" data-tool="line" title="Draw Line">📏</button>
                        <button class="btn btn-tool" data-tool="freehand" title="Freehand">✏️</button>
                        <button class="btn btn-tool" data-tool="zone" title="Highlight Zone">🟨</button>
                    </div>
                    <div class="form-group">
                        <label for="draw-color">Draw Color</label>
                        <input type="color" id="draw-color" value="#ffff00">
                    </div>
                    <button id="btn-clear-drawings" class="btn btn-secondary btn-full">Clear Drawings</button>
                </section>

                <!-- Player List -->
                <section class="panel">
                    <h3>Players</h3>
                    <div id="player-list" class="player-list"></div>
                </section>
            </aside>

            <!-- Pitch Area -->
            <main class="pitch-container">
                <canvas id="pitch-canvas"></canvas>
                <!-- Drawing overlay -->
                <canvas id="draw-canvas"></canvas>
                <!-- Player overlay -->
                <div id="pitch-overlay"></div>
            </main>
        </div>

        <!-- Save/Load Modal -->
        <div id="modal-overlay" class="modal-overlay hidden">
            <div class="modal">
                <div class="modal-header">
                    <h3 id="modal-title">Saved Formations</h3>
                    <button id="modal-close" class="btn btn-icon">✕</button>
                </div>
                <div id="modal-body" class="modal-body"></div>
            </div>
        </div>

        <!-- Player Edit Popup -->
        <div id="player-edit-popup" class="player-edit-popup hidden">
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="edit-player-name" maxlength="20">
            </div>
            <div class="form-group">
                <label>Number</label>
                <input type="number" id="edit-player-number" min="1" max="99">
            </div>
            <div class="form-group">
                <label>Role</label>
                <input type="text" id="edit-player-role" maxlength="10" placeholder="e.g. CM, ST">
            </div>
            <div class="popup-actions">
                <button id="btn-save-player" class="btn btn-primary btn-small">Save</button>
                <button id="btn-cancel-player" class="btn btn-secondary btn-small">Cancel</button>
            </div>
        </div>
    </div>

    <script src="js/formations.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/pitch.js"></script>
    <script src="js/players.js"></script>
    <script src="js/drawing.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
